version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: bali_guide_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: bali_guide_db
      MYSQL_USER: bali_user
      MYSQL_PASSWORD: bali_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - bali_guide_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bali_guide_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: password
    ports:
      - "8089:80"
    depends_on:
      - mysql
    networks:
      - bali_guide_network

volumes:
  mysql_data:

networks:
  bali_guide_network:
    driver: bridge
